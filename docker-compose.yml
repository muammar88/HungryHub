version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: hungry_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hungryhub
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: hungry_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - ELASTIC_PASSWORD=3ekiDFkbQ8ATn0E50v7Y
    ports:
      - '9200:9200'
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -s -u elastic:3ekiDFkbQ8ATn0E50v7Y http://localhost:9200 >/dev/null || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  app:
    build: .
    container_name: hungry_nest
    ports:
      - '3000:3000'
    depends_on:
      elasticsearch:
        condition: service_healthy
      mysql:
        condition: service_started
    environment:
      DATABASE_URL: mysql://user:password@mysql:3306/hungryhub
      # DATABASE_URL="mysql://root:@localhost:3306/hungryhub_db"
      ELASTIC_NODE: http://elasticsearch:9200
      ELASTIC_USERNAME: elastic
      ELASTIC_PASSWORD: 3ekiDFkbQ8ATn0E50v7Y
      # ELASTICSEARCH_NODE: http://elasticsearch:9200
      # ELASTIC_USERNAME: elastic
      # ELASTIC_PASSWORD: 3ekiDFkbQ8ATn0E50v7Y
    volumes:
      - .:/app
    command: npm run start:dev

volumes:
  mysql_data:
  es_data:
